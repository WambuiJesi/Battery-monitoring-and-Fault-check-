<!DOCTYPE html>
<html>
<head>
    <title>Battery Monitor</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 10px; display: inline-block; shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        #voltage { font-size: 48px; color: #27ae60; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Battery Voltage</h1>
        <div id="voltage">Connecting...</div>
        <p id="status">Waiting for Firebase...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWjwUB9Bsv-LVXWiumiVB_0tQ9Wao3kZ4",
            authDomain: "battery-monitoring-62edf.firebaseapp.com",
            databaseURL: "https://battery-monitoring-62edf-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "battery-monitoring-62edf",
            storageBucket: "battery-monitoring-62edf.firebasestorage.app",
            messagingSenderId: "1045887864699",
            appId: "1:1045887864699:web:4f7b45bb7f4f3a0b1af7de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const batteryRef = ref(db, 'battery/voltage');

        onValue(batteryRef, (snapshot) => {
            const data = snapshot.val();
            if (data !== null) {
                document.getElementById("voltage").innerText = data + " V";
                document.getElementById("status").innerText = "Live Data";
            } else {
                document.getElementById("voltage").innerText = "--";
                document.getElementById("status").innerText = "No data in database yet";
            }
        }, (error) => {
            document.getElementById("status").innerText = "Error: " + error.message;
        });
    </script>
</body>
</html>
