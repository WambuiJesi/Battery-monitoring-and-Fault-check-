<!DOCTYPE html>
<html>
<head>
    <title>Battery Monitor</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; background: #f4f4f4; }
        .card { background: white; padding: 20px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .data-box { margin: 15px 0; }
        .value { font-size: 32px; color: #27ae60; font-weight: bold; }
        .label { font-size: 14px; color: #777; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Battery Status</h1>
        
        <div class="data-box">
            <div class="label">Voltage</div>
            <div id="voltage" class="value">-- V</div>
        </div>
        <div class="data-box">
            <div class="label">Current</div>
            <div id="current" class="value">-- A</div>
        </div>
        <div class="data-box">
            <div class="label">Temperature</div>
            <div id="temperature" class="value">-- °C</div>
        </div>
        
        <p id="status">Connecting...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAWjwUB9Bsv-LVXWiumiVB_0tQ9Wao3kZ4",
            authDomain: "battery-monitoring-62edf.firebaseapp.com",
            databaseURL: "https://battery-monitoring-62edf-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "battery-monitoring-62edf",
            storageBucket: "battery-monitoring-62edf.firebasestorage.app",
            messagingSenderId: "1045887864699",
            appId: "1:1045887864699:web:4f7b45bb7f4f3a0b1af7de"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Listen for all battery data at once
        const batteryRef = ref(db, 'battery');

        onValue(batteryRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                document.getElementById("voltage").innerText = (data.voltage || 0) + " V";
                document.getElementById("current").innerText = (data.current || 0) + " A";
                document.getElementById("temperature").innerText = (data.temperature || 0) + " °C";
                document.getElementById("status").innerText = "Live Data";
            } else {
                document.getElementById("status").innerText = "No data available";
            }
        }, (error) => {
            document.getElementById("status").innerText = "Error: " + error.message;
        });
    </script>
</body>
</html>
